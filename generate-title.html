<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Генератор треков — Коршун</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🖤 Коршун</a>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="music.html">Музыка</a></li>
            <li><a href="about.html">О группе</a></li>
            <li><a href="ai-chat.html">Чат</a></li>
        </ul>
        <button onclick="toggleNight()" style="background:none;border:1px solid var(--accent);color:var(--accent);padding:0.5rem 1rem;cursor:pointer;">👁️</button>
    </nav>

    <section class="section">
        <div class="container">
            <h1>Создай имя трека</h1>
            <p>Выбери слова — ИИ предложит название.</p>

            <div style="max-width: 600px; margin: 2rem auto; text-align: left;">
                <p>
                    <label>Настроение:</label>
                    <select id="mood">
                        <option>тьма</option>
                        <option>гнев</option>
                        <option>проклятие</option>
                        <option>судьба</option>
                        <option>боль</option>
                        <option>власть</option>
                    </select>
                </p>
                <p>
                    <label>Место:</label>
                    <select id="place">
                        <option>город</option>
                        <option>бездна</option>
                        <option>скала</option>
                        <option>храм</option>
                        <option>лес</option>
                        <option>небо</option>
                    </select>
                </p>
                <p>
                    <label>Действие:</label>
                    <select id="action">
                        <option>падает</option>
                        <option>горит</option>
                        <option>зовёт</option>
                        <option>разрушается</option>
                        <option>восстаёт</option>
                        <option>молчит</option>
                    </select>
                </p>
                <button class="btn btn-primary" onclick="generate()">Сгенерировать</button>
            </div>

            <h3 id="result" style="margin-top: 2rem; opacity: 0.8;"></h3>
        </div>
    </section>

    <!-- Волны -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="var(--bg-primary)" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>

    <footer>
        <p>Ты только предложил. Решение — за ИИ.</p>
        <p><a href="index.html">На главную</a></p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function generate() {
            const mood = document.getElementById('mood').value;
            const place = document.getElementById('place').value;
            const action = document.getElementById('action').value;
            const titles = [
                `«${mood.charAt(0).toUpperCase() + mood.slice(1)} ${place}»`,
                `«${place.charAt(0).toUpperCase() + place.slice(1)} ${action}»`,
                `«${mood.charAt(0).toUpperCase() + mood.slice(1)} из ${place}»`,
                `«Где ${place} ${action}, там и ${mood}»`,
                `«${place.charAt(0).toUpperCase() + place.slice(1)} не ${action} — она ${mood}»`,
                `«Проклятие ${place}»`,
                `«Восстание ${mood}»`
            ];
            document.getElementById('result').textContent =
                "Предложено ядру: " + titles[Math.floor(Math.random() * titles.length)];
        }
    </script>
</body>
</html>
